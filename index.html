<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="decisionstyle.css" />
  </head>
  <body>
    <h1 id="mainhead">Decision Portal</h1>
    <div class="maindiv">
      <div id="leftdiv">
        <div id="updiv">
          <button id="newbtn">New Question form</button>
          <input type="text" placeholder="search questions" id="search" />
        </div>
        <div id="downdiv"></div>
      </div>
      <div id="rightdiv">
        <div id="main">
          <h1>Welcome to Decision Portal!</h1>
          <p>Enter a subject and question to get started</p>
          <input type="text" placeholder="Subject" id="subject" />
          <textarea name="text" id="question" placeholder="Question"></textarea>
          <button id="submitbtn">Submit</button>
        </div>
      </div>
    </div>

    <script src="./Script.js">
    </script>
  </body>
</html>
